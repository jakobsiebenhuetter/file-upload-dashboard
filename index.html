<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="shortcut icon" href="./icons8-folder-16.png" type="image/x-icon">
    <title>MDocs</title>
    <script>
      // Hier nochmal Dark Mode setzen, damiz es nicht zu unschönen flashes kommt, wenn die Seite geladen wird 
      // -> Referenz siehe DarkModeButton.ts
        if(
            localStorage.getItem('theme') === 'dark' || 
            (!localStorage.getItem('theme') && window.matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
  </head>
  <body>
    <div id="app"></div>
  </body>
  </html>
